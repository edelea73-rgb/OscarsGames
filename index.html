<!DOCTYPE html>
<html lang="en-GB">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Oscar's Sprunki Snacker Pro v4</title>
    <style>
        * { box-sizing: border-box; -webkit-touch-callout: none; -webkit-user-select: none; }
        body { margin: 0; padding: 0; overflow: hidden; background: #f0f5ff; font-family: Arial, sans-serif; touch-action: none; width: 100%; height: 100%; position: fixed; }
        canvas { display: block; touch-action: none; width: 100vw; height: 100vh; }
        #overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: white; display: flex; justify-content: center;
            align-items: center; z-index: 1000; text-align: center; padding: 20px;
        }
        #stopButton {
            position: absolute; top: 0; left: 0; width: 100%;
            height: 70px; background: #ff6464; color: white;
            border: none; font-weight: bold; font-size: 26px;
            cursor: pointer; z-index: 100;
        }
    </style>
</head>
<body>

<div id="overlay"><div><h1>Hello Oscar!</h1><h2>Tap to start your game</h2></div></div>
<button id="stopButton">STOP ALL SOUNDS</button>
<canvas id="gameCanvas"></canvas>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const stopBtn = document.getElementById('stopButton');
const overlay = document.getElementById('overlay');

let width, height, characters = [], foodItems = [], draggingFood = null;
let audioStarted = false;
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
const soundBuffers = {};
const TOTAL_CHARS = 20;

async function loadSound(id) {
    try {
        const response = await fetch(`track${id+1}.wav?v=${Date.now()}`);
        const arrayBuffer = await response.arrayBuffer();
        soundBuffers[id] = await audioCtx.decodeAudioData(arrayBuffer);
    } catch (e) { console.error("Sound error"); }
}

function resize() {
    width = window.innerWidth;
    height = window.innerHeight;
    canvas.width = width;
    canvas.height = height;
    
    const topBarHeight = 80;
    const trayHeight = 130;
    const playAreaHeight = height - topBarHeight - trayHeight;
    
    characters = [];
    // We make them bigger by reducing the "Available Width" division
    const charSpacingX = width / 10.5;
    const charSpacingY = playAreaHeight / 2.1;

    for(let i=0; i<TOTAL_CHARS; i++) {
        let col = i % 10;
        let row = Math.floor(i / 10);
        characters.push({
            id: i,
            x: (charSpacingX * 0.6) + col * charSpacingX,
            y: topBarHeight + 60 + row * charSpacingY,
            colour: `hsl(${i * (360/TOTAL_CHARS)}, 70%, 70%)`,
            isPlaying: false,
            source: null,
            mouthOpen: false,
            chewing: 0,
            vibe: ['jump', 'shake', 'spin'][i % 3],
            // Increased the base scale significantly
            scale: (Math.min(width/1000, playAreaHeight/450) * 1.5) || 1.2
        });
        loadSound(i);
    }
    
    foodItems = [
        { name: 'Cookie', x: width*0.2, y: height-65, bx: width*0.2 },
        { name: 'Broccoli', x: width*0.4, y: height-65, bx: width*0.4 },
        { name: 'Milk', x: width*0.6, y: height-65, bx: width*0.6 },
        { name: 'Bunny', x: width*0.8, y: height-65, bx: width*0.8 }
    ];
}

function drawFood(f) {
    const x = f.x; const y = f.y;
    ctx.save();
    if (f.name === 'Cookie') {
        ctx.fillStyle = '#8b4513'; ctx.beginPath(); ctx.arc(x, y, 30, 0, 6.29); ctx.fill();
        ctx.fillStyle = '#4a2508'; [[-10,-10], [10,-6], [0,12], [-6,6]].forEach(p => {
            ctx.beginPath(); ctx.arc(x+p[0], y+p[1], 4, 0, 6.29); ctx.fill();
        });
    } else if (f.name === 'Broccoli') {
        ctx.fillStyle = '#7d5c3d'; ctx.fillRect(x-6, y, 12, 22);
        ctx.fillStyle = '#228b22'; ctx.beginPath(); ctx.arc(x, y-5, 25, 0, 6.29); ctx.fill();
        ctx.beginPath(); ctx.arc(x-12, y-15, 15, 0, 6.29); ctx.fill();
        ctx.beginPath(); ctx.arc(x+12, y-15, 15, 0, 6.29); ctx.fill();
    } else if (f.name === 'Milk') {
        ctx.fillStyle = '#ffffff'; ctx.fillRect(x-18, y-15, 36, 45);
        ctx.fillStyle = '#ffcc66'; ctx.fillRect(x-12, y-25, 24, 12);
        ctx.beginPath(); ctx.arc(x, y-30, 8, 0, 6.29); ctx.fill();
    } else if (f.name === 'Bunny') {
        ctx.fillStyle = '#5a3214';
        ctx.beginPath(); ctx.ellipse(x, y+10, 22, 18, 0, 0, 6.29); ctx.fill();
        ctx.beginPath(); ctx.arc(x, y-8, 15, 0, 6.29); ctx.fill();
        ctx.beginPath(); ctx.ellipse(x-8, y-28, 6, 18, 0, 0, 6.29); ctx.fill();
        ctx.beginPath(); ctx.ellipse(x+8, y-28, 6, 18, 0, 0, 6.29); ctx.fill();
    }
    ctx.restore();
}

function playTrack(s) {
    if (!soundBuffers[s.id] || s.source) return;
    try {
        s.source = audioCtx.createBufferSource();
        s.source.buffer = soundBuffers[s.id];
        s.source.loop = true;
        const gainNode = audioCtx.createGain();
        s.source.connect(gainNode); gainNode.connect(audioCtx.destination);
        s.source.start(0);
    } catch(e) {}
}

function stopTrack(s) { 
    if (s.source) { try { s.source.stop(); } catch(e) {} s.source = null; } 
}

overlay.onclick = () => {
    audioCtx.resume(); audioStarted = true; overlay.style.display = 'none';
};

function handleStart(x, y) {
    if (!audioStarted) return;
    let hitFood = false;
    foodItems.forEach(f => {
        if (Math.abs(f.x - x) < 60 && Math.abs(f.y - y) < 60) { draggingFood = f; hitFood = true; }
    });
    if (!hitFood) {
        characters.forEach(s => {
            if (Math.abs(s.x - x) < 60 * s.scale && Math.abs(s.y - y) < 80 * s.scale) {
                s.isPlaying = !s.isPlaying;
                s.isPlaying ? playTrack(s) : stopTrack(s);
            }
        });
    }
}

function handleMove(x, y) {
    if (draggingFood) {
        draggingFood.x = x; draggingFood.y = y;
        characters.forEach(s => {
            s.mouthOpen = Math.abs(s.x - x) < 80 * s.scale && Math.abs(s.y - y) < 100 * s.scale;
        });
    }
}

function handleEnd() {
    if (draggingFood) {
        characters.forEach(s => { if (s.mouthOpen) s.chewing = 80; s.mouthOpen = false; });
        draggingFood.x = draggingFood.bx; draggingFood.y = height - 65;
        draggingFood = null;
    }
}

stopBtn.onclick = (e) => {
    e.stopPropagation();
    characters.forEach(s => { s.isPlaying = false; stopTrack(s); });
};

canvas.addEventListener('touchstart', e => { e.preventDefault(); handleStart(e.touches[0].clientX, e.touches[0].clientY); }, {passive: false});
canvas.addEventListener('touchmove', e => { e.preventDefault(); handleMove(e.touches[0].clientX, e.touches[0].clientY); }, {passive: false});
canvas.addEventListener('touchend', handleEnd);
window.addEventListener('resize', resize);

function draw(t) {
    ctx.clearRect(0,0,width,height);
    ctx.fillStyle = "#e1e1eb"; ctx.fillRect(0, height-130, width, 130);
    
    characters.forEach(s => {
        let dx = s.x, dy = s.y, angle = 0;
        if (s.isPlaying) {
            const bounce = Math.abs(Math.sin(t * 0.005)) || 0;
            const wobble = Math.sin(t * 0.02) || 0;
            if (s.vibe === 'jump') dy -= bounce * 25 * s.scale;
            if (s.vibe === 'shake') dx += wobble * 4;
            if (s.vibe === 'spin') angle = t * 0.0015;
        }
        ctx.save();
        ctx.translate(dx, dy);
        ctx.scale(s.scale, s.scale);
        ctx.rotate(angle);
        
        ctx.fillStyle = s.colour;
        ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(-30,60); ctx.lineTo(30,60); ctx.closePath(); ctx.fill();
        ctx.beginPath(); ctx.arc(0,0,30,0,6.29); ctx.fill();
        
        ctx.fillStyle="white"; ctx.beginPath(); ctx.arc(-11,-5,9,0,6.29); ctx.fill(); ctx.beginPath(); ctx.arc(11,-5,9,0,6.29); ctx.fill();
        ctx.fillStyle="black"; ctx.beginPath(); ctx.arc(-11,-5,4,0,6.29); ctx.fill(); ctx.beginPath(); ctx.arc(11,-5,4,0,6.29); ctx.fill();
        
        ctx.lineWidth = 3; ctx.strokeStyle = "black";
        if (s.chewing > 0) {
            ctx.beginPath();
            let cH = 4 + (Math.abs(Math.sin(t*0.06))*8);
            ctx.ellipse(0, 18, 14, cH, 0, 0, 6.29);
            ctx.stroke(); s.chewing--;
        } else if (s.mouthOpen) {
            ctx.beginPath(); ctx.arc(0, 25, 18, 0, 6.29); ctx.stroke();
        } else {
            ctx.beginPath(); ctx.arc(0, 12, 14, 0, 3.14, false); ctx.stroke();
        }
        ctx.restore();
    });
    
    foodItems.forEach(f => drawFood(f));
    requestAnimationFrame(draw);
}

resize(); draw(0);
</script>
</body>
</html>
