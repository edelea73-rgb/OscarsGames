<!DOCTYPE html>
<html lang="en-GB">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Oscar's Sprunki Snacker Pro</title>
    <style>
        body { margin: 0; overflow: hidden; background: #f0f5ff; font-family: Arial, sans-serif; touch-action: none; width: 100vw; height: 100vh; }
        canvas { display: block; width: 100%; height: 100%; }
        #overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: white; display: flex; justify-content: center;
            align-items: center; z-index: 1000; text-align: center;
        }
        #stopButton {
            position: absolute; top: 0; left: 0; width: 100%;
            height: 60px; background: #ff6464; color: white;
            border: none; font-weight: bold; font-size: 24px;
            cursor: pointer; z-index: 100; box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }
    </style>
</head>
<body>

<div id="overlay"><div><h1>Hello Oscar!</h1><h2>Tap here to start your game</h2></div></div>
<button id="stopButton">STOP ALL SOUNDS</button>
<canvas id="gameCanvas"></canvas>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const stopBtn = document.getElementById('stopButton');
const overlay = document.getElementById('overlay');

let width, height, characters = [], foodItems = [], draggingFood = null;
let audioStarted = false;
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
const soundBuffers = {};
const TOTAL_CHARS = 20;

async function loadSound(id) {
    try {
        const response = await fetch(`track${id+1}.wav`);
        const arrayBuffer = await response.arrayBuffer();
        soundBuffers[id] = await audioCtx.decodeAudioData(arrayBuffer);
    } catch (e) { console.log("Sound load error: track " + (id+1)); }
}

function resize() {
    width = window.innerWidth;
    height = window.innerHeight;
    canvas.width = width;
    canvas.height = height;
    
    // Recalculate positions for 20 characters to fit ANY screen size
    characters = [];
    const padding = 60;
    const availableWidth = width - (padding * 2);
    const availableHeight = height - 250; // Leave room for top button and bottom tray

    for(let i=0; i<TOTAL_CHARS; i++) {
        let col = i % 10;
        let row = Math.floor(i / 10);
        characters.push({
            id: i,
            x: padding + col * (availableWidth / 9),
            y: 130 + row * (availableHeight / 1.5),
            colour: `hsl(${i * (360/TOTAL_CHARS)}, 70%, 75%)`,
            isPlaying: false,
            source: null,
            mouthOpen: false,
            chewing: 0,
            vibe: ['jump', 'shake', 'spin'][i % 3]
        });
        loadSound(i);
    }
    
    foodItems = [
        { name: 'Cookie', x: width*0.2, y: height-70, color: '#8b4513', bx: width*0.2 },
        { name: 'Broccoli', x: width*0.4, y: height-70, color: '#228b22', bx: width*0.4 },
        { name: 'Milk', x: width*0.6, y: height-70, color: '#ffffff', bx: width*0.6 },
        { name: 'Bunny', x: width*0.8, y: height-70, color: '#5a3214', bx: width*0.8 }
    ];
}

function playTrack(s) {
    if (!soundBuffers[s.id]) return;
    s.source = audioCtx.createBufferSource();
    s.source.buffer = soundBuffers[s.id];
    s.source.loop = true;
    const gainNode = audioCtx.createGain();
    s.source.connect(gainNode);
    gainNode.connect(audioCtx.destination);
    s.source.start(0);
}

function stopTrack(s) { if (s.source) { s.source.stop(); s.source = null; } }

overlay.onclick = () => {
    audioCtx.resume();
    audioStarted = true;
    overlay.style.display = 'none';
};

function handleStart(x, y) {
    if (!audioStarted) return;
    let hitFood = false;
    foodItems.forEach(f => {
        if (Math.hypot(f.x - x, f.y - y) < 50) { draggingFood = f; hitFood = true; }
    });
    if (!hitFood) {
        characters.forEach(s => {
            if (Math.hypot(s.x - x, s.y - y) < 45) {
                s.isPlaying = !s.isPlaying;
                s.isPlaying ? playTrack(s) : stopTrack(s);
            }
        });
    }
}

function handleMove(x, y) {
    if (draggingFood) {
        draggingFood.x = x; draggingFood.y = y;
        characters.forEach(s => s.mouthOpen = Math.hypot(s.x - x, s.y - y) < 70);
    }
}

function handleEnd() {
    if (draggingFood) {
        characters.forEach(s => {
            if (s.mouthOpen) s.chewing = 60;
            s.mouthOpen = false;
        });
        draggingFood.x = draggingFood.bx; draggingFood.y = height - 70;
        draggingFood = null;
    }
}

stopBtn.onclick = (e) => {
    e.stopPropagation();
    characters.forEach(s => { s.isPlaying = false; stopTrack(s); });
};

canvas.addEventListener('touchstart', e => { e.preventDefault(); handleStart(e.touches[0].clientX, e.touches[0].clientY); }, {passive: false});
canvas.addEventListener('touchmove', e => { e.preventDefault(); handleMove(e.touches[0].clientX, e.touches[0].clientY); }, {passive: false});
canvas.addEventListener('touchend', handleEnd);
window.addEventListener('resize', resize);

function draw(t) {
    ctx.clearRect(0,0,width,height);
    ctx.fillStyle = "#e1e1eb"; ctx.fillRect(0, height-130, width, 130);
    characters.forEach(s => {
        let dx = s.x, dy = s.y, angle = 0;
        if (s.isPlaying) {
            if (s.vibe === 'jump') dy -= Math.abs(Math.sin(t*0.005)*20);
            if (s.vibe === 'shake') dx += Math.sin(t*0.02)*3;
            if (s.vibe === 'spin') angle = t*0.001;
        }
        ctx.save(); ctx.translate(dx, dy); ctx.rotate(angle);
        ctx.fillStyle = s.colour;
        ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(-30,60); ctx.lineTo(30,60); ctx.fill();
        ctx.beginPath(); ctx.arc(0,0,30,0,6.28); ctx.fill();
        ctx.fillStyle="white"; ctx.beginPath(); ctx.arc(-10,-5,8,0,6.28); ctx.fill(); ctx.beginPath(); ctx.arc(10,-5,8,0,6.28); ctx.fill();
        ctx.fillStyle="black"; ctx.beginPath(); ctx.arc(-10,-5,3,0,6.28); ctx.fill(); ctx.beginPath(); ctx.arc(10,-5,3,0,6.28); ctx.fill();
        ctx.beginPath();
        if (s.chewing > 0) { ctx.ellipse(0, 15, 12, 3 + Math.sin(t*0.05)*4, 0, 0, 6.28); s.chewing--; }
        else if (s.mouthOpen) ctx.arc(0, 20, 15, 0, 6.28);
        else ctx.arc(0, 10, 12, 0, Math.PI, false);
        ctx.stroke(); ctx.restore();
    });
    foodItems.forEach(f => {
        ctx.fillStyle = f.color; ctx.beginPath(); ctx.arc(f.x, f.y, 25, 0, 6.28); ctx.fill();
    });
    requestAnimationFrame(draw);
}
resize(); draw(0);
</script>
</body>
</html>
