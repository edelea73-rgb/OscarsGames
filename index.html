<!DOCTYPE html>
<html lang="en-GB">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Oscar's Sprunki Snacker Pro</title>
    <style>
        body { margin: 0; overflow: hidden; background: #f0f5ff; font-family: Arial, sans-serif; touch-action: none; }
        canvas { display: block; }
        #overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255,255,255,0.9); display: flex; justify-content: center;
            align-items: center; z-index: 1000; cursor: pointer;
        }
        #stopButton {
            position: absolute; top: 20px; right: 20px;
            padding: 15px 30px; background: #ff6464; color: white;
            border: none; border-radius: 15px; font-weight: bold; font-size: 20px;
            cursor: pointer; z-index: 100;
        }
    </style>
</head>
<body>

<div id="overlay"><h1>Tap to Start Oscar's Game!</h1></div>
<button id="stopButton">STOP ALL</button>
<canvas id="gameCanvas"></canvas>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const stopBtn = document.getElementById('stopButton');
const overlay = document.getElementById('overlay');

let width, height, characters = [], foodItems = [], draggingFood = null;
let audioStarted = false;
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
const soundBuffers = {};

// Setup 20 Characters (10 per row)
const TOTAL_CHARS = 20;
const COLOURS = Array.from({length: TOTAL_CHARS}, (_, i) => `hsl(${i * (360/TOTAL_CHARS)}, 70%, 75%)`);

async function loadSound(id) {
    try {
        const response = await fetch(`track${id+1}.wav`);
        const arrayBuffer = await response.arrayBuffer();
        soundBuffers[id] = await audioCtx.decodeAudioData(arrayBuffer);
    } catch (e) { console.log("Sound load error for track " + (id+1)); }
}

function init() {
    width = window.innerWidth; height = window.innerHeight;
    canvas.width = width; canvas.height = height;
    characters = [];
    for(let i=0; i<TOTAL_CHARS; i++) {
        let col = i % 10;
        let row = Math.floor(i / 10);
        characters.push({
            id: i,
            x: 80 + col * (width / 11),
            y: 180 + row * 220,
            colour: COLOURS[i],
            isPlaying: false,
            source: null,
            gainNode: null,
            mouthOpen: false,
            chewing: 0,
            vibe: ['jump', 'shake', 'spin'][i % 3]
        });
        loadSound(i);
    }
    foodItems = [
        { name: 'Cookie', x: width*0.2, y: height-80, color: '#8b4513', bx: width*0.2 },
        { name: 'Broccoli', x: width*0.4, y: height-80, color: '#228b22', bx: width*0.4 },
        { name: 'Milk', x: width*0.6, y: height-80, color: '#ffffff', bx: width*0.6 },
        { name: 'Bunny', x: width*0.8, y: height-80, color: '#5a3214', bx: width*0.8 }
    ];
}

function playTrack(s) {
    if (!soundBuffers[s.id]) return;
    s.source = audioCtx.createBufferSource();
    s.source.buffer = soundBuffers[s.id];
    s.source.loop = true;
    s.gainNode = audioCtx.createGain();
    s.source.connect(s.gainNode);
    s.gainNode.connect(audioCtx.destination);
    s.source.start(0);
}

function stopTrack(s) {
    if (s.source) { s.source.stop(); s.source = null; }
}

overlay.onclick = () => {
    audioCtx.resume();
    audioStarted = true;
    overlay.style.display = 'none';
};

function handleStart(x, y) {
    if (!audioStarted) return;
    let hitFood = false;
    foodItems.forEach(f => {
        if (Math.hypot(f.x - x, f.y - y) < 50) { draggingFood = f; hitFood = true; }
    });
    if (!hitFood) {
        characters.forEach(s => {
            if (Math.hypot(s.x - x, s.y - y) < 60) {
                s.isPlaying = !s.isPlaying;
                s.isPlaying ? playTrack(s) : stopTrack(s);
            }
        });
    }
}

function handleMove(x, y) {
    if (draggingFood) {
        draggingFood.x = x; draggingFood.y = y;
        characters.forEach(s => s.mouthOpen = Math.hypot(s.x - x, s.y - y) < 80);
    }
}

function handleEnd() {
    if (draggingFood) {
        characters.forEach(s => {
            if (s.mouthOpen) s.chewing = 60;
            s.mouthOpen = false;
        });
        draggingFood.x = draggingFood.bx;
        draggingFood.y = height - 80;
        draggingFood = null;
    }
}

stopBtn.onclick = () => characters.forEach(s => { s.isPlaying = false; stopTrack(s); });

// Standard events
canvas.addEventListener('touchstart', e => { e.preventDefault(); handleStart(e.touches[0].clientX, e.touches[0].clientY); });
canvas.addEventListener('touchmove', e => { e.preventDefault(); handleMove(e.touches[0].clientX, e.touches[0].clientY); });
canvas.addEventListener('touchend', handleEnd);
canvas.addEventListener('mousedown', e => handleStart(e.clientX, e.clientY));
canvas.addEventListener('mousemove', e => handleMove(e.clientX, e.clientY));
window.addEventListener('mouseup', handleEnd);

function draw(t) {
    ctx.clearRect(0,0,width,height);
    ctx.fillStyle = "#e1e1eb"; ctx.fillRect(0, height-150, width, 150);
    characters.forEach(s => {
        let dx = s.x, dy = s.y, angle = 0;
        if (s.isPlaying) {
            if (s.vibe === 'jump') dy -= Math.abs(Math.sin(t*0.005)*30);
            if (s.vibe === 'shake') dx += Math.sin(t*0.02)*5;
            if (s.vibe === 'spin') angle = t*0.002;
        }
        ctx.save(); ctx.translate(dx, dy); ctx.rotate(angle);
        ctx.fillStyle = s.colour;
        ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(-40,80); ctx.lineTo(40,80); ctx.fill();
        ctx.beginPath(); ctx.arc(0,0,40,0,Math.PI*2); ctx.fill();
        ctx.fillStyle="white"; ctx.beginPath(); ctx.arc(-15,-5,10,0,6.28); ctx.fill(); ctx.beginPath(); ctx.arc(15,-5,10,0,6.28); ctx.fill();
        ctx.fillStyle="black"; ctx.beginPath(); ctx.arc(-15,-5,4,0,6.28); ctx.fill(); ctx.beginPath(); ctx.arc(15,-5,4,0,6.28); ctx.fill();
        ctx.beginPath();
        if (s.chewing > 0) { ctx.ellipse(0, 20, 15, 5 + Math.sin(t*0.05)*5, 0, 0, 6.28); s.chewing--; }
        else if (s.mouthOpen) ctx.arc(0, 25, 20, 0, 6.28);
        else ctx.arc(0, 15, 15, 0, Math.PI, false);
        ctx.stroke(); ctx.restore();
    });
    foodItems.forEach(f => {
        ctx.fillStyle = f.color; ctx.beginPath(); ctx.arc(f.x, f.y, 30, 0, 6.28); ctx.fill();
    });
    requestAnimationFrame(draw);
}
init(); draw(0);
</script>
</body>
</html>
